<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechDeals - CPU & Laptop Deals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-card: #16161d;
      --bg-card-hover: #1e1e28;
      --accent-primary: #00d4aa;
      --accent-secondary: #ff6b6b;
      --text-primary: #ffffff;
      --text-secondary: #8b8b9a;
      --border-color: #2a2a35;
      --font-heading: 'Outfit', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(0, 212, 170, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(255, 107, 107, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
      z-index: 100;
      padding: 16px 24px;
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent-primary), #00a88a);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    nav {
      display: flex;
      gap: 8px;
    }

    nav a {
      font-family: var(--font-heading);
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    nav a:hover, nav a.active {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.05);
    }

    nav a.active {
      color: var(--accent-primary);
    }

    /* Main content */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 120px 24px 48px;
    }

    /* Hero */
    .hero {
      text-align: center;
      margin-bottom: 48px;
    }

    .hero h1 {
      font-family: var(--font-heading);
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      color: var(--text-secondary);
      font-size: 1.1rem;
      max-width: 500px;
      margin: 0 auto;
    }

    /* Filter bar */
    .filters {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: var(--font-heading);
      font-size: 0.9rem;
      font-weight: 500;
      padding: 10px 24px;
      border: 1px solid var(--border-color);
      border-radius: 100px;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-btn:hover {
      border-color: var(--accent-primary);
      color: var(--text-primary);
    }

    .filter-btn.active {
      background: var(--accent-primary);
      border-color: var(--accent-primary);
      color: var(--bg-primary);
    }

    /* Deals grid */
    .deals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    /* Deal card */
    .deal-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s ease;
      animation: cardFadeIn 0.5s ease forwards;
      opacity: 0;
    }

    .deal-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent-primary);
      box-shadow: 0 8px 32px rgba(0, 212, 170, 0.15);
    }

    @keyframes cardFadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-image {
      height: 180px;
      background: linear-gradient(135deg, #1a1a24 0%, #252530 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-image::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.03) 50%, transparent 60%);
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .card-image-icon {
      font-size: 3rem;
      opacity: 0.3;
    }

    .card-image.has-image::before,
    .card-image.has-image::after {
      display: none;
    }

    .discount-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--accent-secondary);
      color: white;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 6px;
    }

    .card-body {
      padding: 20px;
    }

    .card-category {
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--accent-primary);
      margin-bottom: 8px;
    }

    .card-title {
      font-family: var(--font-heading);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-price {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
    }

    .price-current {
      font-family: var(--font-mono);
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--accent-secondary);
    }

    .price-original {
      font-family: var(--font-mono);
      font-size: 0.95rem;
      color: var(--text-secondary);
      text-decoration: line-through;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
    }

    .store-badge {
      font-size: 0.8rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .condition-tag {
      font-size: 0.7rem;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-secondary);
      text-transform: capitalize;
    }

    .condition-tag.new { background: rgba(0, 212, 170, 0.15); color: var(--accent-primary); }
    .condition-tag.open-box { background: rgba(255, 193, 7, 0.15); color: #ffc107; }
    .condition-tag.used { background: rgba(255, 107, 107, 0.15); color: var(--accent-secondary); }

    .card-action {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--accent-primary);
      border-radius: 10px;
      color: var(--accent-primary);
      font-family: var(--font-heading);
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .card-action:hover {
      background: var(--accent-primary);
      color: var(--bg-primary);
    }

    /* Good deal indicator */
    .deal-card.good-deal .price-current {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .good-deal-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      color: var(--accent-primary);
      background: rgba(0, 212, 170, 0.1);
      padding: 4px 8px;
      border-radius: 4px;
      margin-top: 8px;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--border-color);
      margin-top: 64px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero h1 { font-size: 2rem; }
      .header-inner { flex-direction: column; gap: 16px; }
      nav { gap: 4px; }
      nav a { padding: 6px 12px; font-size: 0.85rem; }
      .deals-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="logo">
        <span class="logo-icon">⚡</span>
        TechDeals
      </a>
      <nav>
        <a href="#" class="active" data-filter="all">All</a>
        <a href="#" data-filter="cpu">CPUs</a>
        <a href="#" data-filter="laptop">Laptops</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>Tech Deals Romania</h1>
      <p>Curated CPU and laptop deals from the best Romanian stores. Updated daily.</p>
    </section>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All Deals</button>
      <button class="filter-btn" data-filter="cpu">CPUs</button>
      <button class="filter-btn" data-filter="laptop">Laptops</button>
    </div>

    <div class="deals-grid" id="dealsGrid">
      <!-- Cards will be injected here -->
    </div>
  </main>

  <footer>
    <p>Built with 🤖 by TechDeals · Data from Romanian e-commerce sites</p>
  </footer>

  <script>
    // Sample deals data
    const deals = [
      {
        id: '1',
        title: 'AMD Ryzen 5 5600 - Procesor 3.5GHz, Socket AM4, Tray',
        price: 568.99,
        originalPrice: 800,
        discount: 29,

        url: 'https://www.vexio.ro/procesoare/amd/2726599-ryzen-5-5600-3-50ghz-socket-am4-tray-fara-cooler/',
        imageUrl: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7c/AMD_Ryzen_5_5600X.jpg/640px-AMD_Ryzen_5_5600X.jpg',
        isGoodDeal: true
      },
      {
        id: '2',
        title: 'AMD Ryzen 5 5600X - Procesor 3.7GHz/4.6GHz, Socket AM4, Box',
        price: 690,
        originalPrice: 850,
        discount: 19,
        store: 'Altex',
        category: 'cpu',
        condition: 'new',
        targetPrice: 700,
        url: 'https://altex.ro/procesor-amd-ryzen-5-5600x-3-7ghz-4-6ghz-socket-am4-100-100000065box/cpd/CSARYZEN55600XB/',
        imageUrl: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7c/AMD_Ryzen_5_5600X.jpg/640px-AMD_Ryzen_5_5600X.jpg',
        isGoodDeal: true
      },
      {
        id: '3',
        title: 'Intel Core i5-12400F - 6-Core, 2.5GHz, Alder Lake',
        price: 459,
        originalPrice: 599,
        discount: 23,
        store: 'PC Garage',
        category: 'cpu',
        condition: 'new',
        targetPrice: 500,
        url: 'https://www.pcgarage.ro/procesoare/intel/core-i5-12400f/',
        imageUrl: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Intel_Core_i5-12400F.jpg/640px-Intel_Core_i5-12400F.jpg',
        isGoodDeal: true
      },
      {
        id: '4',
        title: 'Lenovo ThinkPad L15 Gen 3 - i5-1235U, 16GB RAM, 512GB SSD',
        price: 2499,
        originalPrice: 3200,
        discount: 22,
        store: 'OLX',
        category: 'laptop',
        condition: 'used',
        targetPrice: 2800,
        url: 'https://olx.ro/list/q/thinkpad-l15/',
        imageUrl: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Lenovo_ThinkPad_L15_Gen_1.jpg/640px-Lenovo_ThinkPad_L15_Gen_1.jpg',
        isGoodDeal: true
      },
      {
        id: '5',
        title: 'HP ProBook 450 G9 - i5-1235U, 8GB, 512GB SSD, 15.6" FHD',
        price: 2199,
        originalPrice: 2899,
        discount: 24,
        store: 'Altex',
        category: 'laptop',
        condition: 'new',
        targetPrice: 2500,
        url: 'https://altex.ro/laptop-hp-probook-450-g9-intel-core-i5-1235u-pana-la-4-4ghz-15-6-full-hd-8gb-ssd-512gb-intel-uhd-graphics-windows-11-pro-argintiu/cpd/LAP6A2B7EA/',
        imageUrl: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/HP_ProBook_450_G7.jpg/640px-HP_ProBook_450_G7.jpg',
        isGoodDeal: true
      },
      {
        id: '6',
        title: 'ASUS VivoBook Go 15 - Ryzen 5 7520U, 8GB RAM, 512GB SSD',
        price: 1899,
        originalPrice: 2299,
        discount: 17,
        store: 'Altex',
        category: 'laptop',
        condition: 'new',
        targetPrice: 2000,
        url: 'https://altex.ro/laptop-asus-vivobook-go-15-l1504fa-bq611-amd-ryzen-5-7520u-pana-la-4-3ghz-15-6-full-hd-8gb-ssd-512gb-amd-radeon-610m-free-dos-mixed-black/cpd/LAPL1504FABQ611/',
        imageUrl: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Asus_Vivobook_15_X543M.jpg/640px-Asus_Vivobook_15_X543M.jpg',
        isGoodDeal: true
      },
      {
        id: '7',
        title: 'AMD Ryzen 7 5800X - 8-Core, 3.8GHz, Socket AM4',
        price: 849,
        originalPrice: 1100,
        discount: 23,
        store: 'PC Garage',
        category: 'cpu',
        condition: 'new',
        targetPrice: 900,
        url: 'https://www.pcgarage.ro/procesoare/amd/ryzen-7-5800x/',
        imageUrl: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7c/AMD_Ryzen_5_5600X.jpg/640px-AMD_Ryzen_5_5600X.jpg',
        isGoodDeal: false
      },
      {
        id: '8',
        title: 'Dell Latitude 5420 - i7-1185G7, 16GB, 512GB SSD',
        price: 1899,
        originalPrice: 2600,
        discount: 27,
        store: 'OLX',
        category: 'laptop',
        condition: 'used',
        targetPrice: 2200,
        url: 'https://olx.ro/list/q/dell-latitude-5420/',
        imageUrl: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/Dell_Latitude_5400.jpg/640px-Dell_Latitude_5400.jpg',
        isGoodDeal: true
      }
    ];

    // Render deals
    function renderDeals(filter = 'all') {
      const grid = document.getElementById('dealsGrid');
      const filtered = filter === 'all' ? deals : deals.filter(d => d.category === filter);
      
      grid.innerHTML = filtered.map((deal, index) => `
        <article class="deal-card ${deal.isGoodDeal ? 'good-deal' : ''}" style="animation-delay: ${index * 0.1}s">
          <div class="card-image ${deal.imageUrl ? 'has-image' : ''}">
            ${deal.imageUrl 
              ? `<img src="${deal.imageUrl}" alt="${deal.title}" onerror="this.style.display='none';this.parentElement.classList.remove('has-image');this.parentElement.innerHTML='<span class=\\'card-image-icon\\'>${deal.category === 'cpu' ? '🔲' : '💻'}</span>'">` 
              : `<span class="card-image-icon">${deal.category === 'cpu' ? '🔲' : '💻'}</span>`}
            <span class="discount-badge">-${deal.discount}%</span>
          </div>
          <div class="card-body">
            <span class="card-category">${deal.category === 'cpu' ? 'CPU Processor' : 'Laptop'}</span>
            <h3 class="card-title">${deal.title}</h3>
            <div class="card-price">
              <span class="price-current">${deal.price.toFixed(2)} lei</span>
              <span class="price-original">${deal.originalPrice} lei</span>
            </div>
            ${deal.isGoodDeal ? '<span class="good-deal-badge">🎯 Good deal!</span>' : ''}
            <div class="card-meta">
              <span class="store-badge">🏪 ${deal.store}</span>
              <span class="condition-tag ${deal.condition}">${deal.condition}</span>
            </div>
            <a href="${deal.url}" target="_blank" class="card-action">View Deal →</a>
          </div>
        </article>
      `).join('');
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderDeals(btn.dataset.filter);
      });
    });

    // Nav links
    document.querySelectorAll('nav a[data-filter]').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.filter-btn[data-filter="${link.dataset.filter}"]`).classList.add('active');
        renderDeals(link.dataset.filter);
      });
    });

    // Initial render
    renderDeals();
  </script>
</body>
</html>
